services:
  derbyfish-flow-api-staging:
    image: farmera/derbyfish-flow:$TAG
    container_name: derbyfish-flow-api-staging
    ports:
      - "5010:5000"
    env_file:
      - .env.staging
    environment:
      - FLASK_ENV=staging
      - PYTHONPATH=/app/src/python
    volumes:
      - /home/mattricks/mainnet-agfarms.pkey:/app/flow/mainnet-agfarms.pkey:ro
      - /home/mattricks/pkeys/:/app/flow/accounts/pkeys/:ro
      - /home/mattricks/flow-production.json:/app/flow/accounts/flow-production.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - derbyfish-staging-network
    depends_on:
      - derbyfish-flow-sync-staging

  derbyfish-flow-sync-staging:
    image: farmera/derbyfish-flow-sync:$TAG
    container_name: derbyfish-flow-sync-staging
    env_file:
      - .env.staging
    environment:
      - SYNC_INTERVAL=${SYNC_INTERVAL:-300}
      - PYTHONPATH=/app/src/python
    volumes:
      - /home/mattricks/mainnet-agfarms.pkey:/app/flow/mainnet-agfarms.pkey:ro
      - /home/mattricks/pkeys/:/app/flow/accounts/pkeys/
      - /home/mattricks/flow-production.json:/app/flow/accounts/flow-production.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import os; exit(0 if os.path.exists('/app/flow/accounts/flow-production.json') else 1)"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 40s
    networks:
      - derbyfish-staging-network

networks:
  derbyfish-staging-network:
    driver: bridge
